<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Sports Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="device-wrapper">
        <div class="mobile-phone-frame">
            <div class="phone-notch">
                <div class="phone-camera"></div>
                <div class="phone-speaker"></div>
            </div>
            <div class="phone-screen">
                <div class="auth-container">
                    <div class="auth-header">
                        <div class="auth-logo">InspectAI</div>
                        <div class="auth-subtitle">AI-Powered Talent Assessment</div>
                    </div>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        </div>

                        <div id="auth-error" class="alert-error" style="color: #f87171; font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 20px;"></div>

                        <button type="submit" class="btn">
                            <i data-lucide="log-in"></i>
                            Sign In
                        </button>
                    </form>

                    <div class="auth-switch">
                        Don't have an account? 
                        <a href="register.html" class="auth-switch-link">Register here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
