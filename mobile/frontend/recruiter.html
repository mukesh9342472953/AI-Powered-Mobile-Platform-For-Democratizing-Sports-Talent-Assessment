<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Portal - AI Sports Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .filter-toggle {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .filter-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--accent-primary);
            color: white;
            font-weight: 600;
        }
        .fav-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: var(--radius-md);
            padding: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .fav-btn.active {
            color: #fbbf24;
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }
        .fav-btn.active svg {
            fill: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="device-wrapper">
        <div class="mobile-phone-frame">
            <div class="phone-notch">
                <div class="phone-camera"></div>
                <div class="phone-speaker"></div>
            </div>
            <div class="phone-screen" style="padding-bottom: 70px;">
                <div class="app-header">
                    <div class="app-logo">Recruiter Portal</div>
                    <button onclick="handleLogout()" style="background: none; border: none; color: var(--text-secondary); cursor: pointer;">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>

                <div style="padding: 16px;">
                    <div class="filter-toggle">
                        <button class="filter-btn active" id="tab-search" onclick="switchTab('search')">Search All</button>
                        <button class="filter-btn" id="tab-favorites" onclick="switchTab('favorites')">Saved Favorites</button>
                    </div>

                    <div class="card" id="search-container">
                        <div class="card-title"><i data-lucide="search"></i> Scout Athletes</div>
                        <form id="search-form" onsubmit="executeSearch(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Sport</label>
                                    <select id="s-sport" class="form-select">
                                        <option value="all">All Sports</option>
                                        <option value="Cricket">Cricket</option>
                                        <option value="Football">Football</option>
                                        <option value="Basketball">Basketball</option>
                                        <option value="Tennis">Tennis</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Min Score</label>
                                    <input type="number" id="s-min-score" class="form-input" placeholder="e.g. 70">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Max Age</label>
                                    <input type="number" id="s-max-age" class="form-input" placeholder="e.g. 25">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">State</label>
                                    <input type="text" id="s-state" class="form-input" placeholder="e.g. Maharashtra">
                                </div>
                            </div>
                            <button type="submit" class="btn"><i data-lucide="search"></i> Search</button>
                        </form>
                    </div>

                    <div id="search-results">
                        <!-- Populated via JS -->
                    </div>

                    <div id="contact-modal" class="card" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; width: 85%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
                        <div class="card-title">Contact Athlete</div>
                        <form onsubmit="sendContact(event)">
                            <input type="hidden" id="c-athlete-id">
                            <div class="form-group">
                                <label class="form-label">Message</label>
                                <textarea id="c-message" class="form-input" style="height: 80px;" placeholder="Write a message to this athlete about your recruitment interest..." required></textarea>
                            </div>
                            <div id="c-msg" style="font-size: 13px; margin-bottom: 12px;"></div>
                            <button type="submit" class="btn">Send Request</button>
                            <button type="button" class="btn btn-secondary" style="margin-top: 8px;" onclick="closeContact()">Cancel</button>
                        </form>
                    </div>
                    <!-- Background overlay for modal -->
                    <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 99;" onclick="closeContact()"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/recruiter.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setupSearchableDropdown('s-sport', true);
        });
    </script>
</body>
</html>
