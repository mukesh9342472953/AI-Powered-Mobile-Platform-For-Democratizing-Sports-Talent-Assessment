<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - AI Sports Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .leaderboard-toggle {
            display: flex;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .toggle-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: var(--primary);
            color: white;
        }
        .leader-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .leader-item:last-child {
            border-bottom: none;
        }
        .leader-rank {
            width: 30px;
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .leader-rank.first { color: #fbbf24; font-size: 16px; }
        .leader-rank.second { color: #9ca3af; font-size: 15px; }
        .leader-rank.third { color: #b45309; font-size: 15px; }
        .leader-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary);
        }
        .leader-info {
            flex: 1;
        }
        .leader-name {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 2px;
        }
        .leader-loc {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .leader-score {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="device-wrapper">
        <div class="mobile-phone-frame">
            <div class="phone-notch">
                <div class="phone-camera"></div>
                <div class="phone-speaker"></div>
            </div>
            <div class="phone-screen" style="padding-bottom: 70px;">
                <div class="app-header">
                    <div class="app-logo">Leaderboard</div>
                    <button onclick="window.history.back()" style="background: none; border: none; color: var(--text-secondary); cursor: pointer;">
                        <i data-lucide="chevron-right" style="transform: rotate(180deg);"></i>
                    </button>
                </div>

                <div style="padding: 16px;">
                    <!-- Geo Toggles -->
                    <div class="leaderboard-toggle">
                        <button class="toggle-btn active" onclick="setFilter('district')" id="btn-district">District</button>
                        <button class="toggle-btn" onclick="setFilter('state')" id="btn-state">State</button>
                        <button class="toggle-btn" onclick="setFilter('national')" id="btn-national">National</button>
                    </div>

                    <!-- Metric, Sport, & Age Filters -->
                    <div style="display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;">
                        <input type="text" id="leaderboard-search" class="form-input" placeholder="Search athletes..." oninput="debounceSearch()" style="flex: 1 1 100%; margin-bottom: 4px;">
                        
                        <select id="leaderboard-sport" class="form-select" onchange="resetAndFetch()" style="flex: 1 1 30%;">
                            <option value="Cricket">Cricket</option>
                            <option value="Football">Football</option>
                            <option value="Tennis">Tennis</option>
                            <option value="Badminton">Badminton</option>
                            <option value="Athletics">Athletics</option>
                        </select>
                        <select id="leaderboard-age" class="form-select" onchange="resetAndFetch()" style="flex: 1 1 30%;">
                            <option value="all">Any Age</option>
                            <option value="u15">U-15</option>
                            <option value="u18">U-18</option>
                            <option value="u21">U-21</option>
                            <option value="adult">Adult (21+)</option>
                        </select>
                        <select id="leaderboard-sort" class="form-select" onchange="resetAndFetch()" style="flex: 1 1 30%;">
                            <option value="overall">Overall</option>
                            <option value="speed">Speed</option>
                            <option value="fitness">Fitness</option>
                        </select>
                    </div>

                    <div id="leaderboard-content" class="card" style="padding: 0; overflow: hidden; margin-bottom: 16px;">
                        <div class="loader-ring" style="margin: 40px auto; width: 30px; height: 30px; border-width: 3px;"></div>
                    </div>
                    
                    <button id="load-more-btn" class="btn btn-secondary" onclick="loadMore()" style="display: none; width: 100%; margin-bottom: 20px;">Load More</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/leaderboard.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setupSearchableDropdown('leaderboard-sport');
        });
    </script>
</body>
</html>
