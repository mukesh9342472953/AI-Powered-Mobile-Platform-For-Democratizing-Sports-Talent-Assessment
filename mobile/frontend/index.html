<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sports Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="device-wrapper">
        <div class="mobile-phone-frame">
            <div class="phone-notch">
                <div class="phone-camera"></div>
                <div class="phone-speaker"></div>
            </div>
            <div class="phone-screen" style="justify-content: center; align-items: center; text-align: center;">
                <div class="auth-logo" style="font-size: 48px; margin-bottom: 20px;">InspectAI</div>
                <div class="loader-ring" style="width: 60px; height: 60px; margin: 0 auto 20px;"></div>
                <div style="color: var(--text-secondary);">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Inline script to determine routing on page load before pulling in other modules to avoid flashing -->
    <script>
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');

        setTimeout(() => {
            if (token && userStr) {
                const user = JSON.parse(userStr);
                if (user.role === 'athlete') window.location.href = 'athlete.html';
                else if (user.role === 'coach') window.location.href = 'coach.html';
                else if (user.role === 'recruiter') window.location.href = 'recruiter.html';
                else if (user.role === 'admin') window.location.href = 'dashboard.html';
                else window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        }, 1000);
    </script>
</body>

</html>
